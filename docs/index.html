<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KenPlanner</title>
  <meta name="theme-color" content="#b3541e" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>KenPlanner</h1>
      <div class="toolbar">
        <span id="statusChip" class="status-chip ready" role="status" aria-live="polite">Ready</span>
        <button id="passcodeBtn" type="button">Enter Passcode</button>
      </div>
    </header>

    <nav class="tabs">
      <button id="weeklyTab" class="active">Weekly</button>
      <button id="yearlyTab">Yearly</button>
    </nav>

    <main>
      <section id="weeklyView" class="view active">
        <div class="view-header">
          <button id="prevWeekBtn">Previous Week</button>
          <h2 id="weekLabel"></h2>
          <button id="nextWeekBtn">Next Week</button>
        </div>
        <div id="weekGrid" class="week-grid"></div>
      </section>

      <section id="yearlyView" class="view">
        <div class="view-header">
          <button id="prevYearBtn">Previous Year</button>
          <h2 id="yearLabel"></h2>
          <button id="nextYearBtn">Next Year</button>
          <button id="refreshYearBtn">Refresh</button>
        </div>
        <div id="yearGrid" class="year-grid"></div>
      </section>
    </main>

    <footer id="statusBar" class="status">Ready.</footer>
  </div>

  <div id="passcodeModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="passcodeTitle">
    <div class="modal-card">
      <h2 id="passcodeTitle">Enter Passcode</h2>
      <p class="modal-note">This unlocks write actions (add, update, delete).</p>
      <label for="passcodeInput">Passcode</label>
      <input id="passcodeInput" type="password" placeholder="Passcode" />
      <label class="checkbox-row">
        <input id="rememberPasscode" type="checkbox" checked />
        Remember on this device
      </label>
      <div class="modal-actions">
        <button id="passcodeUnlockBtn" type="button">Unlock</button>
        <button id="passcodeCloseBtn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js?v=20260406"></script>
</body>
</html>
